<!DOCTYPE html>
<head>
  <title>Object Detection (YOLOv8n)</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- 升級 tfjs 版本，移除 coco-ssd -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
</head>
<body>
<input type="file" id="selectImage" disabled="true">
<br><br>
<img id="OriginImage" style="display:none">
<img id="ResizeImage">
<canvas id="canvas" width="0" height="0"></canvas>
<br>
<div id="result" style="color:red">Please wait for loading model.</div>

<script>
var selectImage = document.getElementById('selectImage');
var OriginImage = document.getElementById('OriginImage');
var ResizeImage = document.getElementById('ResizeImage');
var ResizeImageWidth = 500;
var canvas = document.getElementById("canvas");
var context = canvas.getContext("2d");
var result = document.getElementById('result');
var Model;

// COCO 80 類別名稱
var LABELS = [
  'person','bicycle','car','motorcycle','airplane','bus','train','truck',
  'boat','traffic light','fire hydrant','stop sign','parking meter','bench',
  'bird','cat','dog','horse','sheep','cow','elephant','bear','zebra','giraffe',
  'backpack','umbrella','handbag','tie','suitcase','frisbee','skis','snowboard',
  'sports ball','kite','baseball bat','baseball glove','skateboard','surfboard',
  'tennis racket','bottle','wine glass','cup','fork','knife','spoon','bowl',
  'banana','apple','sandwich','orange','broccoli','carrot','hot dog','pizza',
  'donut','cake','chair','couch','potted plant','bed','dining table','toilet',
  'tv','laptop','mouse','remote','keyboard','cell phone','microwave','oven',
  'toaster','sink','refrigerator','book','clock','vase','scissors','teddy bear',
  'hair drier','toothbrush'
];

function LoadModel() {
  result.innerHTML = "Loading model...";
  
  tf.loadGraphModel(
    'https://hyuto.github.io/yolov8-tfjs/yolov8n_web_model/model.json'
  ).then(model => {
    Model = model;
    console.log("✅ 模型載入成功", model);
    result.innerHTML = "Please select one image.";
    document.getElementById('selectImage').disabled = false;
  }).catch(err => {
    console.error("❌ 模型載入失敗", err);
    result.innerHTML = "載入失敗: " + err.message;
  });
}

async function DetectImage() {
  var inputSize = 640;

  // 前處理
  var input = tf.tidy(() =>
    tf.image.resizeBilinear(
      tf.browser.fromPixels(ResizeImage),
      [inputSize, inputSize]
    ).div(255.0).expandDims(0)
  );

  var output = await Model.executeAsync(input);
  input.dispose();

  // YOLOv8 output shape: [1, 84, 8400]
  var data = await output.squeeze().transpose().array();
  output.dispose();

  var threshold = 0.35;
  var boxes = [], scores = [], classes = [];

  for (var i = 0; i < data.length; i++) {
    var row = data[i];
    var classScores = row.slice(4);
    var maxScore = Math.max(...classScores);
    if (maxScore < threshold) continue;
    var classId = classScores.indexOf(maxScore);
    var cx = row[0] / inputSize * ResizeImage.width;
    var cy = row[1] / inputSize * ResizeImage.height;
    var w  = row[2] / inputSize * ResizeImage.width;
    var h  = row[3] / inputSize * ResizeImage.height;
    boxes.push([cy - h/2, cx - w/2, cy + h/2, cx + w/2]);
    scores.push(maxScore);
    classes.push(classId);
  }

  // NMS
  var boxTensor   = tf.tensor2d(boxes);
  var scoreTensor = tf.tensor1d(scores);
  var nmsIdx = await tf.image.nonMaxSuppressionAsync(boxTensor, scoreTensor, 50, 0.45, threshold);
  var idxArr = await nmsIdx.array();
  boxTensor.dispose(); scoreTensor.dispose(); nmsIdx.dispose();

  // 畫面
  canvas.setAttribute("width",  ResizeImage.width);
  canvas.setAttribute("height", ResizeImage.height);
  context.drawImage(ResizeImage, 0, 0, ResizeImage.width, ResizeImage.height);
  var s = Math.max(ResizeImage.width, ResizeImage.height);

  result.innerHTML = "";
  idxArr.forEach(function(idx) {
    var box   = boxes[idx];
    var y = box[0], x = box[1], y2 = box[2], x2 = box[3];
    var bw = x2 - x, bh = y2 - y;
    context.lineWidth   = Math.round(s / 200);
    context.strokeStyle = "#00FFFF";
    context.beginPath();
    context.rect(x, y, bw, bh);
    context.stroke();
    context.fillStyle = "red";
    context.font = Math.round(s / 30) + "px Arial";
    context.fillText(LABELS[classes[idx]], x, y);
    result.innerHTML += "[ " + idx + " ] " + LABELS[classes[idx]] +
      ", " + Math.round(scores[idx] * 100) + "%, " +
      Math.round(x) + ", " + Math.round(y) + ", " +
      Math.round(bw) + ", " + Math.round(bh) + "<br>";
  });

  if (result.innerHTML === "") result.innerHTML = "Unrecognizable";
}

selectImage.onchange = function(event) {
  var files = event.target.files;
  if (FileReader && files && files.length) {
    var fr = new FileReader();
    fr.onload = function() {
      result.innerHTML = "Loading image to detect...";
      context.clearRect(0, 0, canvas.width, canvas.height);
      canvas.setAttribute("width", 0);
      canvas.setAttribute("height", 0);
      OriginImage.src = fr.result;
    };
    fr.readAsDataURL(files[0]);
  }
};

OriginImage.onload = function() {
  try { document.createEvent("TouchEvent"); var width = document.body.clientWidth; }
  catch(e) { var width = ResizeImageWidth; }
  if (OriginImage.height < OriginImage.width) {
    var height = width * OriginImage.height / OriginImage.width;
  } else {
    var height = width;
    width = height * OriginImage.width / OriginImage.height;
  }
  ResizeImage.width  = width;
  ResizeImage.height = height;
  ResizeImage.src = OriginImage.src;
};

ResizeImage.onload = function() { if (Model) DetectImage(); };

window.onload = function() { LoadModel(); };
</script>
</body>
</html>
