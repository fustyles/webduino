<!DOCTYPE html>
<head>
  <title>Object Detection (YOLOv8n)</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
</head>
<body>
<button onclick="location.href=location.pathname;">Front Camera</button>&nbsp;&nbsp;<button onclick="location.href='?back';">Rear Camera</button><br>
<video id="video" width="320" height="240" preload autoplay loop muted></video>
<canvas id="canvas"></canvas>
<br>
<div id="result" style="color:red"></div>

<script>
var video = document.getElementById('video');
var canvas = document.getElementById('canvas');
var context = canvas.getContext('2d');
var result = document.getElementById('result');
var Model;

var LABELS = [
  'person','bicycle','car','motorcycle','airplane','bus','train','truck',
  'boat','traffic light','fire hydrant','stop sign','parking meter','bench',
  'bird','cat','dog','horse','sheep','cow','elephant','bear','zebra','giraffe',
  'backpack','umbrella','handbag','tie','suitcase','frisbee','skis','snowboard',
  'sports ball','kite','baseball bat','baseball glove','skateboard','surfboard',
  'tennis racket','bottle','wine glass','cup','fork','knife','spoon','bowl',
  'banana','apple','sandwich','orange','broccoli','carrot','hot dog','pizza',
  'donut','cake','chair','couch','potted plant','bed','dining table','toilet',
  'tv','laptop','mouse','remote','keyboard','cell phone','microwave','oven',
  'toaster','sink','refrigerator','book','clock','vase','scissors','teddy bear',
  'hair drier','toothbrush'
];

window.onload = function() { LoadModel(); };

function LoadModel() {
  result.innerHTML = "Please wait for loading model.";
  tf.loadGraphModel(
    'https://cdn.jsdelivr.net/gh/hyuto/yolov8-tfjs@master/public/yolov8n_web_model/model.json'
  ).then(model => {
    Model = model;
    console.log("✅ 模型載入成功", model);
    result.innerHTML = "Please select one image.";
    startVideo();
  }).catch(err => {
    console.error("❌ 模型載入失敗", err);
    result.innerHTML = "載入失敗: " + err.message;
  });
}

function startVideo() {
  if (!navigator.mediaDevices || !navigator.mediaDevices.enumerateDevices) {
    console.log("enumerateDevices() not supported.");
    return;
  }

  var videoWidth = 320;
  var videoHeight = 240;

  var back = {audio: false, video: {facingMode: 'user', width: videoWidth, height: videoHeight}};
  navigator.mediaDevices.enumerateDevices()
    .then(function(devices) {
      devices.forEach(function(device) {
        if (device.kind == "videoinput" && device.label.includes("facing back")) {
          if (device.deviceId == '')
            back = {audio: false, video: {facingMode: 'environment', width: videoWidth, height: videoHeight}};
          else
            back = {audio: false, video: {deviceId: {'exact': device.deviceId}, facingMode: 'environment', width: videoWidth, height: videoHeight}};
        }
      });

      var userMedia = (location.search.toLowerCase().indexOf("?back") != -1) ? back :
        {audio: false, video: {facingMode: 'user', width: videoWidth, height: videoHeight}};

      video.style.visibility = "hidden";
      video.style.position = "absolute";
      navigator.mediaDevices.getUserMedia(userMedia)
        .then(stream => {
          video.srcObject = stream;
          video.onloadedmetadata = () => {
            video.play();
            canvas.setAttribute("width", video.width);
            canvas.setAttribute("height", video.height);
            setTimeout(function() { DetectVideo(); }, 100);
          };
        });
    });
}

async function DetectVideo() {
  var inputSize = 640;

  context.drawImage(video, 0, 0, video.width, video.height);

  var input = tf.tidy(() =>
    tf.image.resizeBilinear(
      tf.browser.fromPixels(canvas),
      [inputSize, inputSize]
    ).div(255.0).expandDims(0)
  );

  var output = Model.execute(input);
  input.dispose();

  var tensor = Array.isArray(output) ? output[0] : output;
  var data = await tensor.squeeze().transpose().array();
  tensor.dispose();

  var threshold = 0.35;
  var boxes = [], scores = [], classes = [];

  for (var i = 0; i < data.length; i++) {
    var row = data[i];
    var classScores = row.slice(4);
    var maxScore = Math.max(...classScores);
    if (maxScore < threshold) continue;
    var classId = classScores.indexOf(maxScore);
    var cx = row[0] / inputSize * video.width;
    var cy = row[1] / inputSize * video.height;
    var w  = row[2] / inputSize * video.width;
    var h  = row[3] / inputSize * video.height;
    boxes.push([cy - h/2, cx - w/2, cy + h/2, cx + w/2]);
    scores.push(maxScore);
    classes.push(classId);
  }

  if (boxes.length > 0) {
    var boxTensor   = tf.tensor2d(boxes);
    var scoreTensor = tf.tensor1d(scores);
    var nmsIdx = await tf.image.nonMaxSuppressionAsync(boxTensor, scoreTensor, 50, 0.45, threshold);
    var idxArr = await nmsIdx.array();
    boxTensor.dispose(); scoreTensor.dispose(); nmsIdx.dispose();

    result.innerHTML = "";
    idxArr.forEach(function(idx) {
      var box = boxes[idx];
      var y = box[0], x = box[1], y2 = box[2], x2 = box[3];
      var bw = x2 - x, bh = y2 - y;
      context.lineWidth   = "3";
      context.strokeStyle = "#00FFFF";
      context.beginPath();
      context.rect(x, y, bw, bh);
      context.stroke();
      context.fillStyle = "red";
      context.font = "12px Arial";
      context.fillText(LABELS[classes[idx]], x, y);
      result.innerHTML += "[ " + idx + " ] " + LABELS[classes[idx]] +
        ", " + Math.round(scores[idx] * 100) + "%, " +
        Math.round(x) + ", " + Math.round(y) + ", " +
        Math.round(bw) + ", " + Math.round(bh) + "<br>";
    });
  } else {
    result.innerHTML = "Unrecognizable";
  }

  setTimeout(function() { DetectVideo(); }, 100);
}
</script>

</body>
</html>
